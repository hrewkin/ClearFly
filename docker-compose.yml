version: '3.9'
services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - booking
      - passenger
      - incident
      - baggage
      - analytics
    environment:
      - JWT_SECRET=supersecret

  booking:
    build: ./booking
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
    depends_on:
      - postgres
      - redis

  passenger:
    build: ./passenger
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
    depends_on:
      - postgres
      - redis

  incident:
    build: ./incident
    ports:
      - "8083:8080"
    depends_on:
      - rabbitmq

  baggage:
    build: ./baggage
    ports:
      - "8084:8080"
    depends_on:
      - postgres

  analytics:
    build: ./analytics
    ports:
      - "8085:8080"
    depends_on:
      - postgres

  webui:
    build: ./webui
    ports:
      - "3000:80"
    depends_on:
      - gateway

  postgres:
    image: postgres:13-alpine
    environment:
      POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata:
